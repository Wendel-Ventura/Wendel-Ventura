name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # diariamente a meia-noite UTC
  workflow_dispatch:        # permite rodar manualmente pela aba Actions
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) Painel principal: estatisticas + linguagens (substitui stats + top-langs)
      - name: Estatisticas e linguagens
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Wendel-Ventura
          filename: metrics.svg
          template: classic
          base: header, repositories
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # 2) Conquistas (substitui o trofeu)
      - name: Conquistas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: Wendel-Ventura
          filename: metrics.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
